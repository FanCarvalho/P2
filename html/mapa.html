<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Zonas - Postes Light</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a1d2e;
            --secondary: #252b3d;
            --tertiary: #2d3142;
            --accent: #0ea5e9;
            --accent-orange: #f97316;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-yellow: #eab308;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --border: #3d4556;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--primary);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* ===== LAYOUT ===== */
        .container {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 350px;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            overflow-y: auto;
            z-index: 400;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sidebar-logo {
            font-size: 1.5rem;
        }

        .search-zone {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .search-input {
            flex: 1;
            background-color: var(--tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .search-btn {
            background-color: var(--accent);
            border: none;
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .search-btn:hover {
            background-color: #0284c7;
        }

        .filters {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .filter-label {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        .filter-select {
            background-color: var(--tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.6rem 0.75rem;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .filter-select:hover,
        .filter-select:focus {
            border-color: var(--accent);
            outline: none;
        }

        /* ===== ZONES LIST ===== */
        .zones-title {
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            letter-spacing: 0.5px;
        }

        .zones-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .zone-item {
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.1) 0%, transparent 100%);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .zone-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), transparent);
        }

        .zone-item:hover {
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.2);
            transform: translateX(4px);
        }

        .zone-item.active {
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.2) 0%, transparent 100%);
            border-color: var(--accent);
        }

        .zone-name {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .zone-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .zone-status.active {
            background-color: var(--accent-green);
        }

        .zone-status.warning {
            background-color: var(--accent-yellow);
        }

        .zone-status.danger {
            background-color: var(--accent-red);
        }

        .zone-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .zone-stat {
            background-color: rgba(0, 0, 0, 0.2);
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            font-size: 0.8rem;
        }

        .zone-stat-label {
            color: var(--text-secondary);
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .zone-stat-value {
            color: var(--text-primary);
            font-weight: 700;
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        /* ===== MAP CONTAINER ===== */
        #map {
            flex: 1;
            background-color: #e8f4f8;
            position: relative;
            z-index: 1;
        }

        /* ===== POPUP CUSTOMIZADO ===== */
        .zone-popup {
            background: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            min-width: 250px;
        }

        .zone-popup-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--accent);
        }

        .zone-popup-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .popup-stat {
            text-align: center;
        }

        .popup-stat-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .popup-stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-top: 0.25rem;
        }

        .popup-divider {
            height: 1px;
            background-color: var(--border);
            margin: 1rem 0;
        }

        .popup-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding: 0.75rem;
            background-color: rgba(14, 165, 233, 0.1);
            border-radius: 6px;
        }

        .popup-status-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .popup-status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-success {
            background-color: rgba(16, 185, 129, 0.2);
            color: var(--accent-green);
        }

        .badge-warning {
            background-color: rgba(245, 158, 11, 0.2);
            color: var(--accent-yellow);
        }

        .badge-danger {
            background-color: rgba(239, 68, 68, 0.2);
            color: var(--accent-red);
        }

        .popup-actions {
            display: flex;
            gap: 0.5rem;
        }

        .popup-btn {
            flex: 1;
            padding: 0.5rem;
            border: 1px solid var(--border);
            background-color: rgba(14, 165, 233, 0.1);
            color: var(--accent);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .popup-btn:hover {
            background-color: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* ===== LEAFLET CUSTOMIZATION ===== */
        .leaflet-popup-content-wrapper {
            background-color: var(--secondary) !important;
            border: 1px solid var(--border) !important;
            border-radius: 10px !important;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4) !important;
        }

        .leaflet-popup-tip {
            background-color: var(--secondary) !important;
            border: 1px solid var(--border) !important;
        }

        .leaflet-container {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* ===== LEGEND ===== */
        .legend {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem;
            z-index: 400;
            max-width: 250px;
        }

        .legend-title {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: -350px;
                top: 0;
                height: 100vh;
                transition: left 0.3s;
                z-index: 500;
            }

            .sidebar.active {
                left: 0;
            }

            .menu-toggle {
                position: absolute;
                top: 1rem;
                left: 1rem;
                z-index: 300;
                background: var(--secondary);
                border: 1px solid var(--border);
                color: var(--text-primary);
                width: 40px;
                height: 40px;
                border-radius: 8px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1.2rem;
            }
        }

        @media (max-width: 1024px) {
            .sidebar {
                width: 300px;
            }

            .zone-stats {
                grid-template-columns: 1fr;
            }
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .zone-item {
            animation: fadeIn 0.3s ease-out;
        }

        .zone-item:nth-child(1) { animation-delay: 0.05s; }
        .zone-item:nth-child(2) { animation-delay: 0.1s; }
        .zone-item:nth-child(3) { animation-delay: 0.15s; }
        .zone-item:nth-child(4) { animation-delay: 0.2s; }
        .zone-item:nth-child(5) { animation-delay: 0.25s; }
    </style>
</head>
<body>
    <div class="container">
        <!-- SIDEBAR -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-logo">⚡</span>
                <span>Zonas</span>
            </div>

            <div class="search-zone">
                <input type="text" class="search-input" id="searchInput" placeholder="Procurar zona...">
                <button class="search-btn" onclick="searchZone()">🔍</button>
            </div>

            <div class="filters">
                <div class="filter-group">
                    <label class="filter-label">Status</label>
                    <select class="filter-select" id="statusFilter" onchange="filterZones()">
                        <option value="">Todos</option>
                        <option value="operacional">Operacional</option>
                        <option value="avarias">Com Avarias</option>
                        <option value="manutencao">Manutenção</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">Consumo</label>
                    <select class="filter-select" id="consumoFilter" onchange="filterZones()">
                        <option value="">Todos</option>
                        <option value="alto">Alto</option>
                        <option value="medio">Médio</option>
                        <option value="baixo">Baixo</option>
                    </select>
                </div>
            </div>

            <div class="zones-title">Zonas Disponíveis</div>
            <div class="zones-list" id="zonesList"></div>
        </div>

        <!-- MAP -->
        <div id="map"></div>

        <!-- LEGEND -->
        <div class="legend">
            <div class="legend-title">Legenda</div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #0ea5e9;"></div>
                <span>Zona Operacional</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #eab308;"></div>
                <span>Zona com Problemas</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #ef4444;"></div>
                <span>Zona Crítica</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background-color: #10b981;"></div>
                <span>Consumo Baixo</span>
            </div>
        </div>

        <!-- MENU TOGGLE (Mobile) -->
        <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()" style="display: none;">☰</button>
    </div>

    <!-- Leaflet JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

    <script>
        // ===== DADOS DAS ZONAS =====
        const zonesData = [
            {
                id: 1,
                name: 'Zona Norte',
                lat: 41.1579,
                lng: -8.6291,
                city: 'Porto',
                postes: 245,
                consumo: '325.4 kWh',
                consumoNumero: 325,
                avarias: 3,
                status: 'operacional',
                lampadas: 28,
                ultSubstituicao: '15/03/2024'
            },
            {
                id: 2,
                name: 'Zona Centro-Norte',
                lat: 40.7367,
                lng: -8.8265,
                city: 'Aveiro',
                postes: 189,
                consumo: '245.2 kWh',
                consumoNumero: 245,
                avarias: 1,
                status: 'operacional',
                lampadas: 12,
                ultSubstituicao: '22/03/2024'
            },
            {
                id: 3,
                name: 'Zona Centro',
                lat: 40.2838,
                lng: -8.4953,
                city: 'Covilhã',
                postes: 312,
                consumo: '402.8 kWh',
                consumoNumero: 402,
                avarias: 5,
                status: 'avarias',
                lampadas: 35,
                ultSubstituicao: '08/03/2024'
            },
            {
                id: 4,
                name: 'Zona Litoral',
                lat: 39.6567,
                lng: -8.9537,
                city: 'Figueira da Foz',
                postes: 156,
                consumo: '198.5 kWh',
                consumoNumero: 198,
                avarias: 0,
                status: 'operacional',
                lampadas: 8,
                ultSubstituicao: '28/03/2024'
            },
            {
                id: 5,
                name: 'Zona Lisboa',
                lat: 38.7223,
                lng: -9.1393,
                city: 'Lisboa',
                postes: 428,
                consumo: '542.3 kWh',
                consumoNumero: 542,
                avarias: 8,
                status: 'manutencao',
                lampadas: 45,
                ultSubstituicao: '01/03/2024'
            },
            {
                id: 6,
                name: 'Zona Sul',
                lat: 37.0675,
                lng: -7.9427,
                city: 'Faro',
                postes: 267,
                consumo: '354.1 kWh',
                consumoNumero: 354,
                avarias: 2,
                status: 'operacional',
                lampadas: 22,
                ultSubstituicao: '19/03/2024'
            },
            {
                id: 7,
                name: 'Zona Este',
                lat: 40.2808,
                lng: -7.4977,
                city: 'Castelo Branco',
                postes: 198,
                consumo: '256.7 kWh',
                consumoNumero: 256,
                avarias: 4,
                status: 'avarias',
                lampadas: 18,
                ultSubstituicao: '12/03/2024'
            },
            {
                id: 8,
                name: 'Zona Algarve',
                lat: 37.2744,
                lng: -8.6847,
                city: 'Silves',
                postes: 215,
                consumo: '287.9 kWh',
                consumoNumero: 287,
                avarias: 1,
                status: 'operacional',
                lampadas: 15,
                ultSubstituicao: '25/03/2024'
            }
        ];

        let map;
        let markers = {};
        let currentZone = null;

        // ===== INITIALIZE MAP =====
        function initMap() {
            // Coordenadas centrais de Portugal
            map = L.map('map').setView([39.5, -8], 6);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(map);

            // Adicionar markers para cada zona
            zonesData.forEach(zone => {
                addMarker(zone);
            });

            renderZonesList();
            updateResponsive();
        }

        // ===== ADD MARKER =====
        function addMarker(zone) {
            const statusColor = getStatusColor(zone.status);
            
            const markerIcon = L.divIcon({
                html: `
                    <div style="
                        width: 40px;
                        height: 40px;
                        background: ${statusColor};
                        border: 3px solid white;
                        border-radius: 50%;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        font-size: 1.2rem;
                        box-shadow: 0 4px 8px rgba(0,0,0,0.3);
                        cursor: pointer;
                    ">
                        📍
                    </div>
                `,
                iconSize: [40, 40],
                className: 'zone-marker'
            });

            const marker = L.marker([zone.lat, zone.lng], { icon: markerIcon }).addTo(map);
            
            marker.bindPopup(createPopupContent(zone), {
                maxWidth: 300,
                className: 'zone-popup'
            });

            marker.on('click', () => {
                selectZone(zone.id);
            });

            markers[zone.id] = marker;
        }

        // ===== CREATE POPUP CONTENT =====
        function createPopupContent(zone) {
            const statusBadge = getStatusBadge(zone.status);
            
            return `
                <div style="padding: 1rem;">
                    <div class="zone-popup-title">${zone.name}</div>
                    <div style="color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 1rem;">📍 ${zone.city}</div>
                    
                    <div class="zone-popup-stats">
                        <div class="popup-stat">
                            <div class="popup-stat-value">${zone.postes}</div>
                            <div class="popup-stat-label">Postes</div>
                        </div>
                        <div class="popup-stat">
                            <div class="popup-stat-value">${zone.avarias}</div>
                            <div class="popup-stat-label">Avarias</div>
                        </div>
                    </div>

                    <div class="popup-status">
                        <span class="popup-status-label">Status da Zona</span>
                        <span class="popup-status-badge ${statusBadge.class}">${statusBadge.text}</span>
                    </div>

                    <div style="background-color: rgba(14, 165, 233, 0.1); padding: 0.75rem; border-radius: 6px; margin-bottom: 1rem;">
                        <div style="font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 0.5rem;">⚡ Consumo Mensal</div>
                        <div style="font-size: 1.25rem; font-weight: 700;">${zone.consumo}</div>
                    </div>

                    <div style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1rem;">
                        <div>💡 Lâmpadas a vencer: <strong>${zone.lampadas}</strong></div>
                        <div>📅 Última substituição: ${zone.ultSubstituicao}</div>
                    </div>

                    <div class="popup-actions">
                        <button class="popup-btn" onclick="viewZoneDetails(${zone.id})">Ver Detalhes</button>
                        <button class="popup-btn" onclick="editZone(${zone.id})">Editar</button>
                    </div>
                </div>
            `;
        }

        // ===== GET STATUS COLOR =====
        function getStatusColor(status) {
            switch(status) {
                case 'operacional':
                    return '#0ea5e9';
                case 'avarias':
                    return '#eab308';
                case 'manutencao':
                    return '#ef4444';
                default:
                    return '#10b981';
            }
        }

        // ===== GET STATUS BADGE =====
        function getStatusBadge(status) {
            switch(status) {
                case 'operacional':
                    return { text: '✓ Operacional', class: 'badge-success' };
                case 'avarias':
                    return { text: '⚠️ Com Avarias', class: 'badge-warning' };
                case 'manutencao':
                    return { text: '🔧 Manutenção', class: 'badge-danger' };
                default:
                    return { text: 'Desconhecido', class: 'badge-info' };
            }
        }

        // ===== RENDER ZONES LIST =====
        function renderZonesList() {
            const zonesList = document.getElementById('zonesList');
            zonesList.innerHTML = '';

            zonesData.forEach(zone => {
                const statusColor = getStatusColor(zone.status);
                const item = document.createElement('div');
                item.className = 'zone-item';
                item.id = `zone-${zone.id}`;
                item.onclick = () => selectZone(zone.id);

                const statusIcon = zone.status === 'operacional' ? '✓' : 
                                   zone.status === 'avarias' ? '⚠️' : 
                                   '🔧';

                item.innerHTML = `
                    <div class="zone-name">
                        <div class="zone-status" style="background-color: ${statusColor};"></div>
                        <span>${zone.name}</span>
                    </div>
                    <div class="zone-stats">
                        <div class="zone-stat">
                            <div class="zone-stat-label">Postes</div>
                            <div class="zone-stat-value">${zone.postes}</div>
                        </div>
                        <div class="zone-stat">
                            <div class="zone-stat-label">Avarias</div>
                            <div class="zone-stat-value">${zone.avarias}</div>
                        </div>
                        <div class="zone-stat">
                            <div class="zone-stat-label">Consumo</div>
                            <div class="zone-stat-value">${Math.round(zone.consumoNumero / 100)}k</div>
                        </div>
                        <div class="zone-stat">
                            <div class="zone-stat-label">Lâmpadas</div>
                            <div class="zone-stat-value">${zone.lampadas}</div>
                        </div>
                    </div>
                `;

                zonesList.appendChild(item);
            });
        }

        // ===== SELECT ZONE =====
        function selectZone(zoneId) {
            // Remove active de todos
            document.querySelectorAll('.zone-item').forEach(item => {
                item.classList.remove('active');
            });

            // Adiciona active ao selecionado
            document.getElementById(`zone-${zoneId}`).classList.add('active');

            // Find zone and pan to it
            const zone = zonesData.find(z => z.id === zoneId);
            if (zone) {
                map.setView([zone.lat, zone.lng], 10);
                markers[zoneId].openPopup();
                currentZone = zone;
            }
        }

        // ===== FILTER ZONES =====
        function filterZones() {
            const statusFilter = document.getElementById('statusFilter').value;
            const consumoFilter = document.getElementById('consumoFilter').value;

            document.querySelectorAll('.zone-item').forEach(item => {
                let show = true;

                // Filter by status
                if (statusFilter) {
                    const zoneId = parseInt(item.id.split('-')[1]);
                    const zone = zonesData.find(z => z.id === zoneId);
                    if (zone.status !== statusFilter) {
                        show = false;
                    }
                }

                // Filter by consumo
                if (consumoFilter && show) {
                    const zoneId = parseInt(item.id.split('-')[1]);
                    const zone = zonesData.find(z => z.id === zoneId);
                    
                    if (consumoFilter === 'alto' && zone.consumoNumero < 350) show = false;
                    if (consumoFilter === 'medio' && (zone.consumoNumero < 250 || zone.consumoNumero >= 350)) show = false;
                    if (consumoFilter === 'baixo' && zone.consumoNumero >= 250) show = false;
                }

                item.style.display = show ? 'block' : 'none';
            });
        }

        // ===== SEARCH ZONE =====
        function searchZone() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            document.querySelectorAll('.zone-item').forEach(item => {
                const zoneName = item.querySelector('.zone-name span').textContent.toLowerCase();
                item.style.display = zoneName.includes(searchTerm) ? 'block' : 'none';
            });
        }

        // ===== VIEW ZONE DETAILS =====
        function viewZoneDetails(zoneId) {
            const zone = zonesData.find(z => z.id === zoneId);
            alert(`Detalhes da ${zone.name}\n\nPostes: ${zone.postes}\nAvarias: ${zone.avarias}\nConsumo: ${zone.consumo}\nLâmpadas a vencer: ${zone.lampadas}`);
        }

        // ===== EDIT ZONE =====
        function editZone(zoneId) {
            alert(`Editar zona ${zoneId}`);
        }

        // ===== TOGGLE SIDEBAR (Mobile) =====
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        // ===== UPDATE RESPONSIVE =====
        function updateResponsive() {
            const menuToggle = document.getElementById('menuToggle');
            if (window.innerWidth <= 768) {
                menuToggle.style.display = 'flex';
            } else {
                menuToggle.style.display = 'none';
                document.getElementById('sidebar').classList.remove('active');
            }
        }

        // ===== EVENT LISTENERS =====
        window.addEventListener('resize', updateResponsive);
        document.getElementById('searchInput').addEventListener('keyup', searchZone);

        // ===== INITIALIZE ON LOAD =====
        document.addEventListener('DOMContentLoaded', initMap);
    </script>
</body>
</html>
