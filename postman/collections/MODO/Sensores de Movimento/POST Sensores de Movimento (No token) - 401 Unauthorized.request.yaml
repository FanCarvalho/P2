$kind: http-request
url: "{{baseUrl}}/sensores-movimento"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "modelo": "SM-POSTMAN",
      "sensibilidade": 75,
      "alcance": 11.2,
      "estado": "ativo"
    }
scripts:
  - type: afterResponse
    code: pm.test('Status 401', function () { pm.response.to.have.status(401); });
    language: text/javascript
order: 2000
