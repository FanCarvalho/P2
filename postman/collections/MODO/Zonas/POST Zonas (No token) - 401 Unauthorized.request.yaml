$kind: http-request
url: "{{baseUrl}}/zonas"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "nome": "Zona Postman",
      "rua": "Rua Postman",
      "codigo_postal": "4000-111",
      "id_sensor": 1
    }
scripts:
  - type: afterResponse
    code: pm.test('Status 401', function () { pm.response.to.have.status(401); });
    language: text/javascript
order: 2000
