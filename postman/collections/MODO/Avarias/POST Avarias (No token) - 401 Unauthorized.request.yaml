$kind: http-request
url: "{{baseUrl}}/avarias"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "descricao": "Avaria Postman",
      "severidade": "media",
      "estado": "pendente",
      "id_lampada": 1
    }
scripts:
  - type: afterResponse
    code: pm.test('Status 401', function () { pm.response.to.have.status(401); });
    language: text/javascript
order: 2000
