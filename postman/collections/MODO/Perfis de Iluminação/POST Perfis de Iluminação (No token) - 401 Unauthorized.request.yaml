$kind: http-request
url: "{{baseUrl}}/perfis-iluminacao"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "nome": "Perfil Postman",
      "hora_inicio": "18:00",
      "hora_fim": "06:00",
      "intensidade": 60
    }
scripts:
  - type: afterResponse
    code: pm.test('Status 401', function () { pm.response.to.have.status(401); });
    language: text/javascript
order: 2000
