$kind: http-request
url: "{{baseUrl}}/lampadas"
method: POST
headers:
  Authorization: Bearer {{jwtToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "id_poste": 1,
      "modelo": "LED-POSTMAN",
      "potencia_watts": 50,
      "luminosidade_max": 900,
      "luminosidade_min": 250,
      "estado": "ativa",
      "tempo_vida_horas": 45000
    }
scripts:
  - type: afterResponse
    code: pm.test('Status 201', function () { pm.response.to.have.status(201); });
    language: text/javascript
order: 1000
