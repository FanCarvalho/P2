$kind: http-request
url: "{{baseUrl}}/operadores"
method: POST
headers:
  Authorization: Bearer {{jwtToken}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "nome": "Postman Operador",
      "email": "postman.operador.{{$timestamp}}@empresa.com",
      "password": "password12345",
      "nivel_acesso": "operador",
      "ativo": true
    }
scripts:
  - type: afterResponse
    code: pm.test('Status 201', function () { pm.response.to.have.status(201); });
    language: text/javascript
order: 1000
