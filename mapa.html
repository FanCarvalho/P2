<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map | Glowpath</title>
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/mapa.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
  <script>
    window.API_BASE_URL = "http://127.0.0.1:3000";
  </script>
  <script src="./js/auth.js"></script>
  <script defer src="./js/components.js"></script>
  <style>
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(20, 20, 22, 0.8);
      display: grid;
      place-items: center;
      z-index: 3000;
      padding: 24px;
    }

    .modal-backdrop[hidden] {
      display: none;
    }

    .modal {
      width: min(720px, 100%);
      background: #1e1e24;
      color: #ffffff;
      border: 1px solid #2d2d35;
      border-radius: 12px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px;
      border-bottom: 1px solid #2d2d35;
    }

    .modal-header h3 {
      margin: 0;
      font-size: 18px;
    }

    .modal-body {
      padding: 20px 22px 22px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-grid label {
      display: grid;
      gap: 6px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #b3b3b3;
    }

    .form-grid input,
    .form-grid select,
    .form-grid textarea {
      padding: 10px 12px;
      border: 1px solid #2d2d35;
      border-radius: 8px;
      background: #141416;
      color: #ffffff;
      font-size: 14px;
    }

    .form-grid input:focus,
    .form-grid select:focus,
    .form-grid textarea:focus {
      outline: 2px solid rgba(0, 123, 255, 0.6);
      border-color: #007bff;
    }

    .form-grid .span-2 {
      grid-column: span 2;
    }

    .readonly-box {
      margin-top: 16px;
      padding: 12px;
      border: 1px solid #2d2d35;
      border-radius: 8px;
      background: #141416;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      font-size: 13px;
      color: #b3b3b3;
    }

    .readonly-box strong {
      color: #ffffff;
      font-weight: 600;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 18px;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid transparent;
      cursor: pointer;
      font-weight: 600;
    }

    .btn.primary {
      background: #007bff;
      color: #ffffff;
    }

    .btn.ghost {
      background: transparent;
      border-color: #2d2d35;
      color: #b3b3b3;
    }

    .icon-btn {
      background: transparent;
      border: none;
      color: #b3b3b3;
      font-size: 18px;
      cursor: pointer;
    }

    .icon-btn:hover,
    .btn.ghost:hover {
      color: #ffffff;
    }

    .btn.primary:hover {
      filter: brightness(1.05);
    }
  </style>
</head>
<body data-page="mapa">
  <div class="app-shell">
    <div data-include="./components/sidebar.html"></div>

    <main class="main-content">
      <div data-include="./components/topbar.html"></div>

      <section class="card map-card">
        <div class="map-heading">
          <h3>Mapa de Cobertura</h3>
        </div>

        <div class="map-frame">
          <div id="map"></div>

          <aside id="zona-info" class="zona-info is-empty" hidden></aside>
        </div>
      </section>

      <div class="modal-backdrop" id="editRegionModal" hidden>
        <div class="modal">
          <header class="modal-header">
            <h3>Editar Regiao</h3>
            <button class="icon-btn" type="button" aria-label="Fechar" data-close>✕</button>
          </header>

          <form class="modal-body" id="editRegionForm">
            <div class="form-grid">
              <label>
                Nome da Regiao
                <input type="text" name="name" required />
              </label>

              <label>
                Status
                <select name="status" required>
                  <option>Operacional</option>
                  <option>Atencao</option>
                  <option>Avaria</option>
                  <option>Manutencao</option>
                </select>
              </label>

              <label>
                Quantidade de Postes
                <input type="number" name="poles" min="0" step="1" required />
              </label>

              <label>
                Avarias Atuais
                <input type="number" name="faults" min="0" step="1" required />
              </label>

              <label>
                Consumo Mensal (kWh)
                <input type="number" name="consumption" min="0" step="1" required />
              </label>

              <label>
                Lampadas a Vencer
                <input type="number" name="expiring" min="0" step="1" required />
              </label>

              <label>
                Ultima Substituicao
                <input type="date" name="lastReplacement" required />
              </label>

              <label class="span-2">
                Notas (opcional)
                <textarea name="notes" rows="3" placeholder="Adicione notas de manutencao..."></textarea>
              </label>
            </div>

            <div class="readonly-box">
              <div>Taxa de Avarias: <strong id="faultRate">-</strong></div>
              <div>Nivel de Risco: <strong id="riskLevel">-</strong></div>
            </div>

            <footer class="modal-footer">
              <button type="button" class="btn ghost" data-close>Cancelar</button>
              <button type="submit" class="btn primary">Guardar</button>
            </footer>
          </form>
        </div>
      </div>

      <div data-include="./components/footer.html"></div>
    </main>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', async function () {
      if (typeof ensureAuthenticated === 'function') {
        const ok = await ensureAuthenticated();
        if (!ok) return;
      }

      var map = L.map('map').setView([39.5, -8], 7);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
      }).addTo(map);

      var zonas = {
        porto: { nome: 'Porto', postes: 1500, avarias: 5, status: 'Operacional', consumo: '2500 kWh', vencimento: 120, substituicao: '2023-10-15' },
        lisboa: { nome: 'Lisboa', postes: 2200, avarias: 12, status: 'Operacional', consumo: '3200 kWh', vencimento: 200, substituicao: '2023-11-01' },
        viseu: { nome: 'Viseu', postes: 800, avarias: 2, status: 'Operacional', consumo: '1200 kWh', vencimento: 50, substituicao: '2024-01-20' },
        seia: { nome: 'Seia', postes: 400, avarias: 1, status: 'Operacional', consumo: '600 kWh', vencimento: 30, substituicao: '2024-02-10' },
        braga: { nome: 'Braga', postes: 1100, avarias: 3, status: 'Operacional', consumo: '1600 kWh', vencimento: 80, substituicao: '2023-12-05' },
        coimbra: { nome: 'Coimbra', postes: 950, avarias: 7, status: 'Atenção', consumo: '1400 kWh', vencimento: 65, substituicao: '2023-11-22' },
        sintra: { nome: 'Sintra', postes: 700, avarias: 4, status: 'Operacional', consumo: '1000 kWh', vencimento: 45, substituicao: '2024-01-05' },
        alentejo: { nome: 'Alentejo', postes: 1800, avarias: 15, status: 'Avaria', consumo: '2800 kWh', vencimento: 150, substituicao: '2023-09-10' },
        algarve: { nome: 'Algarve', postes: 1300, avarias: 6, status: 'Operacional', consumo: '2000 kWh', vencimento: 100, substituicao: '2023-10-30' },
        madeira: { nome: 'Madeira', postes: 600, avarias: 2, status: 'Operacional', consumo: '900 kWh', vencimento: 40, substituicao: '2024-02-15' },
        acores: { nome: 'Açores', postes: 500, avarias: 1, status: 'Operacional', consumo: '750 kWh', vencimento: 35, substituicao: '2024-03-01' }
      };

      var markers = {};
      var zoneInfoPanel = document.getElementById('zona-info');

      function renderZoneInfo(zoneKey) {
        var zonaInfo = zonas[zoneKey];
        if (!zonaInfo) return;

        zoneInfoPanel.hidden = false;
        zoneInfoPanel.classList.remove('is-empty');

        var parts = [
          '<h4>' + zonaInfo.nome + '</h4>',
          '<p><strong>Quantidade de Postes:</strong> ' + zonaInfo.postes + '</p>',
          '<p><strong>Avarias Atuais:</strong> ' + zonaInfo.avarias + '</p>',
          '<p><strong>Status:</strong> ' + zonaInfo.status + '</p>',
          '<p><strong>Consumo Mensal:</strong> ' + zonaInfo.consumo + '</p>',
          '<p><strong>Lâmpadas a Vencer:</strong> ' + zonaInfo.vencimento + '</p>',
          '<p><strong>Última Substituição:</strong> ' + zonaInfo.substituicao + '</p>'
        ];

        // Mostrar ações apenas para admins. Utilizadores normais não veem os botões.
        if (typeof isAdmin === 'function' && isAdmin()) {
          parts.push('<div class="zona-actions"><button type="button">Ver Detalhes</button><button type="button" class="js-edit-zone" data-zone="' + zoneKey + '">Editar</button></div>');
        }

        zoneInfoPanel.innerHTML = parts.join('');
      }

      Object.keys(zonas).forEach(function (zoneKey) {
        var coords = {
          porto: [41.1579, -8.6291],
          lisboa: [38.7223, -9.1393],
          viseu: [40.6570, -7.9138],
          seia: [40.4229, -7.7036],
          braga: [41.5454, -8.4265],
          coimbra: [40.2033, -8.4103],
          sintra: [38.799, -9.386],
          alentejo: [38.5714, -7.9077],
          algarve: [37.0194, -7.9322],
          madeira: [32.6669, -16.9241],
          acores: [37.7412, -25.6756]
        };
        var zona = zonas[zoneKey];
        var marker = L.marker(coords[zoneKey]).addTo(map).bindPopup('<strong>' + zona.nome + '</strong>');
        marker.on('click', function () {
          renderZoneInfo(zoneKey);
        });

        markers[zoneKey] = marker;
      });

      var modal = document.getElementById('editRegionModal');
      var form = document.getElementById('editRegionForm');
      var faultRateEl = document.getElementById('faultRate');
      var riskLevelEl = document.getElementById('riskLevel');

      function calculateRiskLevel(rate) {
        if (rate >= 10) return 'Alto';
        if (rate >= 5) return 'Medio';
        return 'Baixo';
      }

      function updateDerivedFields() {
        var totalPoles = Number(form.elements.poles.value) || 0;
        var faults = Number(form.elements.faults.value) || 0;
        var rate = totalPoles > 0 ? (faults / totalPoles) * 100 : 0;
        faultRateEl.textContent = rate.toFixed(1) + '%';
        riskLevelEl.textContent = calculateRiskLevel(rate);
      }

      function openEditModal(regionData) {
        if (!regionData) return;

        var regionName = regionData.name || regionData.nome || '';
        var regionStatus = regionData.status || 'Operacional';
        var regionPoles = regionData.poles !== undefined ? regionData.poles : regionData.postes;
        var regionFaults = regionData.faults !== undefined ? regionData.faults : regionData.avarias;
        var regionConsumption = regionData.consumption !== undefined ? regionData.consumption : regionData.consumo;
        var regionExpiring = regionData.expiring !== undefined ? regionData.expiring : regionData.vencimento;
        var regionLastReplacement = regionData.lastReplacement || regionData.substituicao || '';

        form.elements.name.value = regionName;
        form.elements.status.value = regionStatus;
        form.elements.poles.value = regionPoles || 0;
        form.elements.faults.value = regionFaults || 0;
        form.elements.consumption.value = Number(String(regionConsumption || '').replace(/\D/g, '')) || 0;
        form.elements.expiring.value = regionExpiring || 0;
        form.elements.lastReplacement.value = regionLastReplacement;

        updateDerivedFields();
        modal.hidden = false;
      }

      function closeEditModal() {
        modal.hidden = true;
      }

      document.addEventListener('click', function (event) {
        var target = event.target;
        if (target && target.classList.contains('js-edit-zone')) {
          var zoneKey = target.getAttribute('data-zone');
          openEditModal(zonas[zoneKey]);
        }

        if (target && target.hasAttribute('data-close')) {
          closeEditModal();
        }
      });

      form.addEventListener('input', function (event) {
        if (event.target.name === 'poles' || event.target.name === 'faults') {
          updateDerivedFields();
        }
      });

      form.addEventListener('submit', function (event) {
        event.preventDefault();
        closeEditModal();
      });
    });
  </script>
</body>
</html>
