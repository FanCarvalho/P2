<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map | Glowpath</title>
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/mapa.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
   <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
  <script src="./js/auth.js"></script>
  <script defer src="./js/components.js"></script>
</head>
<body data-page="mapa">
  <div class="app-shell">
    <div data-include="./components/sidebar.html"></div>

    <main class="main-content">
      <div data-include="./components/topbar.html"></div>

      <section class="card map-card">
        <div class="map-heading">
          <h3>Mapa de Cobertura</h3>
        </div>

        <div class="map-frame">
          <div id="map"></div>

          <aside id="zona-info" class="zona-info is-empty" hidden></aside>
        </div>
      </section>

      <div data-include="./components/footer.html"></div>
    </main>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var map = L.map('map').setView([39.5, -8], 7);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
      }).addTo(map);

      var zonas = {
        porto: { nome: 'Porto', postes: 1500, avarias: 5, status: 'Operacional', consumo: '2500 kWh', vencimento: 120, substituicao: '2023-10-15' },
        lisboa: { nome: 'Lisboa', postes: 2200, avarias: 12, status: 'Operacional', consumo: '3200 kWh', vencimento: 200, substituicao: '2023-11-01' },
        viseu: { nome: 'Viseu', postes: 800, avarias: 2, status: 'Operacional', consumo: '1200 kWh', vencimento: 50, substituicao: '2024-01-20' },
        seia: { nome: 'Seia', postes: 400, avarias: 1, status: 'Operacional', consumo: '600 kWh', vencimento: 30, substituicao: '2024-02-10' },
        braga: { nome: 'Braga', postes: 1100, avarias: 3, status: 'Operacional', consumo: '1600 kWh', vencimento: 80, substituicao: '2023-12-05' },
        coimbra: { nome: 'Coimbra', postes: 950, avarias: 7, status: 'Atenção', consumo: '1400 kWh', vencimento: 65, substituicao: '2023-11-22' },
        sintra: { nome: 'Sintra', postes: 700, avarias: 4, status: 'Operacional', consumo: '1000 kWh', vencimento: 45, substituicao: '2024-01-05' },
        alentejo: { nome: 'Alentejo', postes: 1800, avarias: 15, status: 'Avaria', consumo: '2800 kWh', vencimento: 150, substituicao: '2023-09-10' },
        algarve: { nome: 'Algarve', postes: 1300, avarias: 6, status: 'Operacional', consumo: '2000 kWh', vencimento: 100, substituicao: '2023-10-30' },
        madeira: { nome: 'Madeira', postes: 600, avarias: 2, status: 'Operacional', consumo: '900 kWh', vencimento: 40, substituicao: '2024-02-15' },
        acores: { nome: 'Açores', postes: 500, avarias: 1, status: 'Operacional', consumo: '750 kWh', vencimento: 35, substituicao: '2024-03-01' }
      };

      var markers = {};
      var zoneInfoPanel = document.getElementById('zona-info');

      function renderZoneInfo(zoneKey) {
        var zonaInfo = zonas[zoneKey];
        if (!zonaInfo) return;

        zoneInfoPanel.hidden = false;
        zoneInfoPanel.classList.remove('is-empty');

        var parts = [
          '<h4>' + zonaInfo.nome + '</h4>',
          '<p><strong>Quantidade de Postes:</strong> ' + zonaInfo.postes + '</p>',
          '<p><strong>Avarias Atuais:</strong> ' + zonaInfo.avarias + '</p>',
          '<p><strong>Status:</strong> ' + zonaInfo.status + '</p>',
          '<p><strong>Consumo Mensal:</strong> ' + zonaInfo.consumo + '</p>',
          '<p><strong>Lâmpadas a Vencer:</strong> ' + zonaInfo.vencimento + '</p>',
          '<p><strong>Última Substituição:</strong> ' + zonaInfo.substituicao + '</p>'
        ];

        // Mostrar ações apenas para admins. Utilizadores normais não veem os botões.
        if (typeof isAdmin === 'function' && isAdmin()) {
          parts.push('<div class="zona-actions"><button type="button">Ver Detalhes</button><button type="button">Editar</button></div>');
        }

        zoneInfoPanel.innerHTML = parts.join('');
      }

      Object.keys(zonas).forEach(function (zoneKey) {
        var coords = {
          porto: [41.1579, -8.6291],
          lisboa: [38.7223, -9.1393],
          viseu: [40.6570, -7.9138],
          seia: [40.4229, -7.7036],
          braga: [41.5454, -8.4265],
          coimbra: [40.2033, -8.4103],
          sintra: [38.799, -9.386],
          alentejo: [38.5714, -7.9077],
          algarve: [37.0194, -7.9322],
          madeira: [32.6669, -16.9241],
          acores: [37.7412, -25.6756]
        };
        var zona = zonas[zoneKey];
        var marker = L.marker(coords[zoneKey]).addTo(map).bindPopup('<b>' + zona.nome + '</b>');
        marker.on('click', function () {
          renderZoneInfo(zoneKey);
        });

        markers[zoneKey] = marker;
      });
    });
  </script>
</body>
</html>
