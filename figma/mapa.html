<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map | Glowpath</title>
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/mapa.css" />
  <script defer src="./js/components.js"></script>
</head>
<body data-page="mapa">
  <div class="app-shell">
    <div data-include="./components/sidebar.html"></div>

    <main class="main-content">
      <div data-include="./components/topbar.html"></div>

      <section class="map-layout">
        <article class="card">
          <h3>Parceiros por Regiao</h3>
          <ul class="partner-list">
            <li>Sao Paulo, BR - 18 parceiros</li>
            <li>Lisboa, PT - 9 parceiros</li>
            <li>Madrid, ES - 7 parceiros</li>
            <li>Miami, US - 14 parceiros</li>
          </ul>
        </article>

        <article class="card">
          <h3>Mapa de Cobertura</h3>
          <div class="map-frame">
            <iframe
              title="Mapa de cobertura"
              width="100%"
              height="100%"
              style="border:0; min-height:520px;"
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
              src="https://www.openstreetmap.org/export/embed.html?bbox=-74.1%2C-34.8%2C-30.0%2C6.5&amp;layer=mapnik">
            </iframe>
          </div>
        </article>
      </section>

      <div data-include="./components/footer.html"></div>
    </main>
  </div>
</body>
</html>
