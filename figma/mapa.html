  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var map = L.map('map').setView([39.5, -8], 7);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
      }).addTo(map);

      fetch('./zonas.txt')
        .then(response => response.json())
        .then(zonas => {
          const partnerList = document.querySelector('.partner-list');
          const markers = {};

          for (const zonaKey in zonas) {
            if (zonas.hasOwnProperty(zonaKey)) {
              const zona = zonas[zonaKey];
              
              // Adicionar à lista
              const listItem = document.createElement('li');
              listItem.textContent = zona.nome;
              listItem.dataset.lat = zona.lat;
              listItem.dataset.lon = zona.lon;
              listItem.dataset.key = zonaKey;
              partnerList.appendChild(listItem);

              // Adicionar marcador ao mapa
              markers[zonaKey] = L.marker([zona.lat, zona.lon]).addTo(map).bindPopup(`<b>${zona.nome}</b>`);
            }
          }

          if (markers.porto) {
            markers.porto.openPopup();
          }

          partnerList.querySelectorAll('li').forEach(function(item) {
            item.addEventListener('click', function() {
              // Remove selected class and info from all items
              partnerList.querySelectorAll('li').forEach(function(el) {
                el.classList.remove('selected');
                const existingInfo = el.querySelector('.zona-info-details');
                if (existingInfo) {
                  existingInfo.remove();
                }
              });
              // Add selected class to the clicked item
              this.classList.add('selected');

              var lat = this.getAttribute('data-lat');
              var lon = this.getAttribute('data-lon');
              var zoom = (this.innerText === 'Madeira' || this.innerText === 'Açores') ? 9 : 13;
              map.setView([lat, lon], zoom);

              var markerKey = this.dataset.key;
              if (markers[markerKey]) {
                markers[markerKey].openPopup();
              }

              // Mostrar e preencher informações da zona
              var zonaInfo = zonas[markerKey];
              if (zonaInfo) {
                const infoTemplate = document.getElementById('zona-info-template').cloneNode(true);
                infoTemplate.removeAttribute('id');
                infoTemplate.style.display = 'block';
                infoTemplate.classList.add('zona-info-details');

                this.appendChild(infoTemplate);
              }
            });
