<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Glowpath</title>
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/login.css" />
</head>
<body class="page-login" data-page="login">
  <div class="login-layout">
    <section class="login-brand">
      <h1>Glowpath</h1>
      <p>Seu gateway seguro para trading e gestao de portfolio em cripto.</p>
      <ul>
        <li>Protecao com 2FA</li>
        <li>Dados de mercado em tempo real</li>
        <li>Suporte multi-wallet</li>
      </ul>
    </section>

    <section class="login-form">
      <h2>Welcome Back</h2>
      <p class="page-subtitle">Entre para acessar sua conta.</p>

      <form>
        <label class="form-field">
          <span>Email</span>
          <input class="input" type="email" placeholder="Enter your email" />
        </label>

        <label class="form-field">
          <span>Password</span>
          <input class="input" type="password" placeholder="Enter your password" />
        </label>

        <button class="btn btn-primary" type="submit">Sign In</button>
      </form>
    </section>
  </div>
</body>
</html>
